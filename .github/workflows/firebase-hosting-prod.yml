name: Deploy to Firebase Hosting (prod)

# Auto-deploys the app to Firebase Hosting (the live channel) whenever the
# `prod` branch changes. Promote a release by merging into `prod` (e.g. main -> prod).
# Requires the repo secret FIREBASE_SERVICE_ACCOUNT_FIR_94B95 (a Firebase service
# account JSON key with Hosting deploy permission).
on:
  push:
    branches: [prod]
  workflow_dispatch: {}

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Deploy to Firebase Hosting (live)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FIR_94B95 }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          deploy() { npx -y firebase-tools@latest deploy --only hosting --project fir-94b95 --non-interactive; }
          n=0
          until deploy; do
            n=$((n + 1))
            if [ "$n" -ge 5 ]; then
              echo "Deploy failed after $n attempts."
              rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
              exit 1
            fi
            echo "Deploy attempt $n failed (likely a transient OAuth token-endpoint error); retrying in 15s..."
            sleep 15
          done
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
